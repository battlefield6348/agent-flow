<!doctype html><html><head><meta charset="utf-8"><title>Agent Flow</title><style>body{font:16px sans-serif;max-width:900px;margin:2rem auto}form,input,textarea,button{display:block;margin:.5rem 0;width:100%;box-sizing:border-box}.agent{border:1px solid #ccc;padding:1rem;margin:.5rem 0}</style></head><body><h1>Agent Flow</h1><p id="error"></p><h2>Scheduler</h2><form id="settings"><input name="gitlab_url" placeholder="GitLab URL" required><input name="interval_seconds" type="number" min="1" placeholder="Interval seconds" required><button>Save settings</button></form><h2>Add agent</h2><form id="agent"><input name="id" placeholder="ID" required><input name="name" placeholder="Name"><input name="cmd" placeholder="Command" required><input name="workspace" placeholder="Workspace" required><input name="gitlab_token" placeholder="GitLab token" required><input name="skills" placeholder="Skills (comma separated)"><button>Add agent</button></form><h2>Agents</h2><div id="agents"></div><script>const err=x=>document.querySelector('#error').textContent=x;async function refresh(){let r=await fetch('/api/agents'),a=await r.json();agents.innerHTML=a.map(x=>`<div class=agent><b>${x.id}</b> ${x.name||''}<br>${x.running?'running':'idle'}${x.busy?' / busy':''}<br>${x.cmd} ${x.workspace}</div>`).join('')}settings.onsubmit=async e=>{e.preventDefault();let x=Object.fromEntries(new FormData(e.target));x.interval_seconds=+x.interval_seconds;let r=await fetch('/api/settings',{method:'PUT',body:JSON.stringify(x)});err(r.ok?'':await r.text())};agent.onsubmit=async e=>{e.preventDefault();let x=Object.fromEntries(new FormData(e.target));x.skills=x.skills?x.skills.split(',').map(x=>x.trim()):[];let r=await fetch('/api/agents',{method:'POST',body:JSON.stringify(x)});err(r.ok?'':await r.text());if(r.ok)e.target.reset();refresh()};refresh();setInterval(refresh,2000)</script></body></html>
