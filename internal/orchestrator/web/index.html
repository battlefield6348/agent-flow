<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Flow 控制台</title>
  <style>
    :root { color-scheme: dark; --bg:#0b1020; --panel:#151c31; --line:#293452; --text:#edf2ff; --muted:#9aa8c7; --accent:#68d6b3; --danger:#ff8d9a; }
    * { box-sizing:border-box; } body { margin:0; min-height:100vh; color:var(--text); font:15px/1.5 system-ui,-apple-system,"Noto Sans TC",sans-serif; background:radial-gradient(circle at top right,#1b3155 0,transparent 36%),var(--bg); }
    main { max-width:1120px; margin:auto; padding:40px 24px 64px; } header { display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:28px; } h1 { margin:0; font-size:28px; } h2 { margin:0 0 18px; font-size:18px; } .subtitle { color:var(--muted); margin:4px 0 0; } .badge { color:#06261d; background:var(--accent); padding:5px 10px; border-radius:999px; font-weight:700; font-size:13px; white-space:nowrap; }
    .panel { background:color-mix(in srgb,var(--panel) 94%,transparent); border:1px solid var(--line); border-radius:16px; padding:22px; box-shadow:0 16px 42px #02050d66; } .summary { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin:0 0 20px; } .summary .panel { padding:16px; } .summary strong { display:block; font-size:28px; } .summary span { color:var(--muted); font-size:13px; } .section-heading { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; } label { display:block; color:var(--muted); font-size:13px; margin:14px 0 5px; } input,textarea { width:100%; border:1px solid var(--line); border-radius:9px; padding:10px 12px; color:var(--text); background:#0d1427; font:inherit; } input[type=checkbox] { width:auto; } input:focus,textarea:focus { outline:2px solid #68d6b366; border-color:var(--accent); } button { margin-top:18px; border:0; border-radius:9px; padding:10px 16px; cursor:pointer; color:#06261d; background:var(--accent); font-weight:800; font:inherit; } button:hover { filter:brightness(1.1); } .section-heading button,.close { margin-top:0; } .agent button { float:right; margin-top:12px; background:#b7c6e8; } dialog { width:min(640px,calc(100% - 32px)); max-height:calc(100vh - 32px); border:1px solid var(--line); border-radius:16px; padding:0; color:var(--text); background:var(--panel); box-shadow:0 24px 64px #02050dcc; } dialog::backdrop { background:#02050dbb; } dialog form { padding:22px; } .dialog-heading { display:flex; align-items:center; justify-content:space-between; gap:12px; } .dialog-heading h2 { margin:0; }
    #error { min-height:24px; margin:0 0 16px; color:var(--muted); } #error.success { color:#7ee2ae; } #error.info { color:#8fc8ff; } #error.warning { color:#ffd27d; } #error.error { color:var(--danger); } .agents { display:grid; grid-template-columns:repeat(auto-fit,minmax(245px,1fr)); gap:14px; } .agent { border:1px solid var(--line); border-radius:13px; padding:16px; background:#0d1427; } .agent-top { display:flex; justify-content:space-between; gap:12px; align-items:start; } .agent h3 { margin:0; font-size:16px; } .agent p { margin:8px 0 0; color:var(--muted); word-break:break-all; font-size:13px; } .state { border-radius:99px; padding:3px 8px; font-size:12px; font-weight:700; background:#24314d; color:#c9d6ef; } .state.running { color:#052219; background:var(--accent); } .state.busy { color:#f0e8ff; background:#7657c8; } .state.stopped { color:#c9d6ef; background:#3b4968; } .empty { grid-column:1/-1; color:#8fc8ff; text-align:center; padding:32px; border:1px dashed #42658d; border-radius:13px; background:#12213a; }
    @media (max-width:720px) { main { padding:24px 16px; } header { display:block; } .badge { display:inline-block; margin-top:12px; } .summary { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main>
    <header><div><h1>Agent Flow 控制台</h1><p class="subtitle">設定排程、管理本機 AI Agent 與查看執行狀態。</p></div><span class="badge">本機服務</span></header>
    <p id="error" role="alert"></p>
    <section class="summary" aria-label="Agent 狀態摘要"><div class="panel"><strong id="idle-count">0</strong><span>待命中</span></div><div class="panel"><strong id="busy-count">0</strong><span>執行任務中</span></div><div class="panel"><strong id="stopped-count">0</strong><span>已停止</span></div></section>
    <section class="panel"><div class="section-heading"><h2>Agent 總覽</h2><div><button type="button" data-dialog="settings-dialog">排程設定</button><button type="button" data-dialog="agent-dialog">新增 Agent</button></div></div><div id="agents" class="agents"></div></section>
    <dialog id="settings-dialog" role="dialog" aria-labelledby="settings-title"><form id="settings"><div class="dialog-heading"><h2 id="settings-title">排程設定</h2><button type="button" class="close" aria-label="關閉排程設定">關閉</button></div><label for="gitlab_url">GitLab URL</label><input id="gitlab_url" name="gitlab_url" placeholder="https://gitlab.example.com" required><label for="interval_seconds">輪詢間隔（秒）</label><input id="interval_seconds" name="interval_seconds" type="number" min="1" placeholder="60" required><label><input id="check_ci_success" name="check_ci_success" type="checkbox"> 僅在 CI 成功後派送</label><label for="allowed_projects">允許專案（每行一個；留空不限）</label><textarea id="allowed_projects" name="allowed_projects" rows="3" placeholder="group/project"></textarea><label for="allowed_mr_authors">允許 MR 作者（每行一個；留空不限）</label><textarea id="allowed_mr_authors" name="allowed_mr_authors" rows="3" placeholder="username"></textarea><button>儲存排程設定</button></form></dialog>
    <dialog id="agent-dialog" role="dialog" aria-labelledby="agent-title"><form id="agent"><div class="dialog-heading"><h2 id="agent-title">新增 Agent</h2><button type="button" class="close" aria-label="關閉新增 Agent">關閉</button></div><label for="id">識別碼</label><input id="id" name="id" placeholder="coder" required><label for="name">名稱</label><input id="name" name="name" placeholder="自動編碼 Agent"><label for="cmd">執行指令</label><input id="cmd" name="cmd" placeholder="codex、claude 或 agy" required><label for="workspace">工作目錄</label><input id="workspace" name="workspace" placeholder="/workspace/your-project" required><label for="gitlab_token">GitLab Token</label><input id="gitlab_token" name="gitlab_token" type="password" required><label for="prompt_suffix">任務附加指示</label><input id="prompt_suffix" name="prompt_suffix" placeholder="完成後標記 @reviewer"><label for="skills">Skills（逗號分隔；留空使用角色預設）</label><input id="skills" name="skills" placeholder="superpowers:senior-coder-workflow"><button>新增並啟動 Agent</button></form></dialog>
  </main>
  <script>
    const error = (message, type = 'error') => { const el = document.querySelector('#error'); el.textContent = message; el.className = type; };
    const statusLabel = agent => agent.busy ? '執行任務中' : agent.running ? '待命中' : '已停止';
    const statusClass = agent => agent.busy ? 'busy' : agent.running ? 'running' : 'stopped';
    async function loadSettings() {
      const response = await fetch('/api/settings');
      if (!response.ok) return error('無法載入已儲存的排程設定。', 'error');
      const settings = await response.json();
      document.querySelector('#gitlab_url').value = settings.gitlab_url || '';
      document.querySelector('#interval_seconds').value = settings.interval_seconds || '';
	  document.querySelector('#check_ci_success').checked = !!settings.check_ci_success;
	  document.querySelector('#allowed_projects').value = (settings.allowed_projects || []).join('\n');
	  document.querySelector('#allowed_mr_authors').value = (settings.allowed_mr_authors || []).join('\n');
    }
    async function refresh() {
      const response = await fetch('/api/agents');
      if (!response.ok) return error('無法取得 Agent 狀態。', 'error');
      const agents = await response.json();
      document.querySelector('#idle-count').textContent = agents.filter(agent => agent.running && !agent.busy).length;
      document.querySelector('#busy-count').textContent = agents.filter(agent => agent.busy).length;
      document.querySelector('#stopped-count').textContent = agents.filter(agent => !agent.running && !agent.busy).length;
      document.querySelector('#agents').innerHTML = agents.length ? agents.map(agent => `<article class="agent"><div class="agent-top"><h3>${agent.name || agent.id}</h3><span class="state ${statusClass(agent)}">${statusLabel(agent)}</span></div><p>識別碼：${agent.id}<br>目前狀態：${statusLabel(agent)}<br>指令：${agent.cmd}<br>工作目錄：${agent.workspace}</p><button type="button" onclick="restartAgent('${agent.id}')">重新啟動</button><button type="button" onclick="deleteAgent('${agent.id}')">刪除</button></article>`).join('') : '<div class="empty">目前查無 Agent。</div>';
    }
    document.querySelectorAll('[data-dialog]').forEach(button => button.onclick = () => document.querySelector(`#${button.dataset.dialog}`).showModal());
    document.querySelectorAll('.close').forEach(button => button.onclick = () => button.closest('dialog').close());
    document.querySelector('#settings').onsubmit = async event => { event.preventDefault(); const data = Object.fromEntries(new FormData(event.target)); data.interval_seconds = Number(data.interval_seconds); data.check_ci_success = document.querySelector('#check_ci_success').checked; data.allowed_projects = data.allowed_projects.split('\n').map(value => value.trim()).filter(Boolean); data.allowed_mr_authors = data.allowed_mr_authors.split('\n').map(value => value.trim()).filter(Boolean); const response = await fetch('/api/settings', {method:'PUT', body:JSON.stringify(data)}); error(response.ok ? '排程設定已儲存。' : await response.text(), response.ok ? 'success' : 'error'); };
    document.querySelector('#agent').onsubmit = async event => { event.preventDefault(); const data = Object.fromEntries(new FormData(event.target)); data.skills = data.skills ? data.skills.split(',').map(value => value.trim()).filter(Boolean) : []; const response = await fetch('/api/agents', {method:'POST', body:JSON.stringify(data)}); error(response.ok ? 'Agent 已新增並啟動。' : await response.text(), response.ok ? 'success' : 'error'); if (response.ok) { event.target.reset(); event.target.closest('dialog').close(); } refresh(); };
    async function restartAgent(id) { const response = await fetch(`/api/agents/restart?id=${encodeURIComponent(id)}`, {method:'POST'}); error(response.ok ? `${id} 已重新啟動。` : await response.text(), response.ok ? 'success' : 'error'); refresh(); }
    async function deleteAgent(id) { if (!confirm(`確定刪除 ${id}？`)) return; const response = await fetch(`/api/agents/${encodeURIComponent(id)}`, {method:'DELETE'}); error(response.ok ? `${id} 已刪除。` : await response.text(), response.ok ? 'success' : 'error'); refresh(); }
    loadSettings(); refresh(); setInterval(refresh, 2000);
  </script>
</body>
</html>
